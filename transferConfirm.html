<!DOCTYPE html>
<html dir="rtl">

<head>
  <meta charset="utf-8">
  <base target="_top">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Segoe UI", "Google Sans", Arial, sans-serif;
      background: #f8fafd;
      color: #202124;
      direction: rtl;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 20px;
      gap: 12px;
      text-align: center;
    }

    .icon {
      font-size: 36px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .question {
      font-size: 15px;
      color: #5f6368;
      font-weight: 500;
    }

    .name {
      font-size: 18px;
      color: #1a73e8;
      font-weight: 700;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 8px;
    }

    .footer {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding-top: 10px;
      margin-top: auto;
      width: 100%;
    }

    button {
      padding: 10px 18px;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      font-family: inherit;
      font-weight: 600;
      transition: all 0.2s ease;
      white-space: nowrap;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .btn-yes {
      background: #1a73e8;
      color: #fff;
      flex-grow: 1;
    }

    .btn-yes:hover {
      background: #1558b0;
      box-shadow: 0 4px 6px rgba(26,115,232,0.2);
      transform: translateY(-1px);
    }

    .btn-other {
      background: #fff;
      color: #1a73e8;
      border: 1px solid #dadce0;
    }

    .btn-other:hover {
      background: #f1f3f4;
    }

    .btn-cancel {
      background: #fff;
      color: #5f6368;
      border: 1px solid #dadce0;
    }

    .btn-cancel:hover {
      background: #f1f3f4;
    }

    #clipTarget {
      position: fixed;
      left: -9999px;
      top: -9999px;
    }

    /* New styles for note feature */
    #view1, #view2, #view3 {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    .input-group {
      width: 100%;
      text-align: right;
      margin-bottom: 12px;
    }
    
    .input-group.row {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .input-group label {
      font-size: 14px;
      color: #3c4043;
      margin-bottom: 6px;
      display: block;
      font-weight: 600;
    }

    .input-style {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      box-sizing: border-box;
      font-family: inherit;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    
    .input-style:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.2);
    }

    .input-style.textarea {
      height: 70px;
      resize: none;
    }

    .loading {
      display: none;
      margin-top: 8px;
      font-size: 13px;
      color: #1a73e8;
      font-weight: 500;
    }

    .hidden {
      display: none !important;
    }

    #view2, #view3 {
      padding-top: 4px;
    }

    .old-note-preview {
      background-color: #fef7e0;
      padding: 10px;
      border-right: 4px solid #fbbc04;
      margin-bottom: 12px;
      white-space: pre-wrap;
      font-size: 13px;
      max-height: 90px;
      overflow-y: auto;
      color: #333;
      border-radius: 4px 0 0 4px;
      text-align: right;
    }

    .action-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: auto;
      justify-content: center;
      width: 100%;
    }
    
    .action-btns button {
      flex: 1 1 calc(50% - 8px);
      padding: 8px 12px;
      font-size: 13px;
    }
    
    .conflict-label {
      font-size: 13px; 
      font-weight: 600; 
      text-align: right; 
      margin-bottom: 4px;
      color: #3c4043;
    }
  </style>
</head>

<body>

  <!-- View 1: Main Transfer Prompt -->
  <div id="view1">
    <div class="icon">🏢</div>
    <div class="question">להעביר לטיפול המשרד את כל החובות של:</div>
    <div class="name" id="nameDisplay"></div>

    <div class="input-group row" style="margin-bottom: 16px;">
      <label for="reasonInput" style="margin: 0;">סיבת העברה:</label>
      <input type="text" id="reasonInput" list="reasonOptions" value="סירוב אשראי" tabindex="2"
        class="input-style" style="width: 140px; text-align: center; padding: 8px;">
      <datalist id="reasonOptions">
        <option value="סירוב אשראי">
        <option value="משלם מזומן">
        <option value="אין אשראי">
        <option value="בעיות גביה">
        <option value="לקוח לטיפול המשרד">
      </datalist>
    </div>

    <!-- NEW Deal Account Input -->
    <div class="input-group">
      <label for="dealAccountInput">חשבון עסקה (אופציונלי):</label>
      <input type="text" id="dealAccountInput" tabindex="3" placeholder="חשבון עסקה" class="input-style">
    </div>

    <div class="input-group" style="margin-bottom: 4px;">
      <label for="newNote">הערה למשרד (אופציונלי):</label>
      <textarea id="newNote" tabindex="4" placeholder="הזן כאן הערה ללקוח זה..." class="input-style textarea"></textarea>
    </div>

    <div id="loading1" class="loading">בודק הערות... אנא המתן</div>

    <div class="footer">
      <button class="btn-cancel" onclick="doCancel()" tabindex="7">ביטול</button>
      <button class="btn-other" onclick="doOther()" tabindex="6">לקוח אחר</button>
      <button class="btn-yes" id="btnYes" onclick="doYes()" tabindex="1">✓ אישור והעבר</button>
    </div>
  </div>

  <!-- View 2: Exists Warning -->
  <div id="view2" class="hidden">
    <h3 style="color: #d32f2f; font-size: 18px; margin-bottom: 8px; text-align: center;">⚠️ מידע קיים</h3>
    <p style="font-size: 14px; margin-bottom: 12px; color: #5f6368;">כבר קיימת הערה/סיבה במערכת עבור לקוח זה.</p>

    <div id="conflictNoteContainer" class="hidden" style="width: 100%;">
      <div class="conflict-label">הערה קיימת:</div>
      <div class="old-note-preview" id="oldNotePreview"></div>
    </div>

    <div id="conflictReasonContainer" class="hidden" style="width: 100%;">
      <div class="conflict-label">סיבת העברה קיימת:</div>
      <div class="old-note-preview" id="oldReasonPreview"></div>
    </div>

    <div id="conflictDealAccountContainer" class="hidden" style="width: 100%;">
      <div class="conflict-label">חשבון עסקה קיים:</div>
      <div class="old-note-preview" id="oldDealAccountPreview"></div>
    </div>

    <div id="loading2" class="loading">שומר ומעביר...</div>

    <div class="action-btns">
      <button class="btn-yes" onclick="actionKeepBoth()" style="background:#34a853;">שמור הכל (שלב)</button>
      <button class="btn-other" onclick="showEditView()"
        style="background:#fbbc04; color:#333; border:none; box-shadow: 0 1px 2px rgba(0,0,0,0.1);">ערוך ידנית</button>
      <button class="btn-cancel" onclick="actionKeepNew()" style="background:#ea4335; color:#fff; border:none;">דרוס עם החדש</button>
      <button class="btn-cancel" onclick="doTransferAndClose()">השאר ישן (התעלם)</button>
    </div>
  </div>

  <!-- View 3: Edit Combined Note -->
  <div id="view3" class="hidden">
    <h3 style="font-size: 18px; margin-bottom: 8px; text-align: center; color: #1a73e8;">עריכה מתקדמת</h3>
    <p style="font-size: 14px; margin-bottom: 16px; color: #5f6368;">ערוך לפני השמירה:</p>

    <div class="input-group">
      <label for="editedNote">הערה למשרד:</label>
      <textarea id="editedNote" class="input-style textarea"></textarea>
    </div>

    <div class="input-group">
      <label for="editedReason">סיבת העברה:</label>
      <input type="text" id="editedReason" class="input-style">
    </div>

    <div class="input-group" id="editedDealAccountGroup">
      <label for="editedDealAccount">חשבון עסקה:</label>
      <input type="text" id="editedDealAccount" class="input-style">
    </div>

    <div id="loading3" class="loading">שומר ומעביר...</div>
    <div class="footer" style="margin-top: auto;">
      <button class="btn-cancel" onclick="doTransferAndClose()">בטל והעבר</button>
      <button class="btn-yes" onclick="submitEditedNote()">שמור והעבר</button>
    </div>
  </div>

  <textarea id="clipTarget"></textarea>

  <script>
    var defaultName = "<?= defaultName ?>";
    var defaultSum = Number("<?= typeof defaultSum !== 'undefined' ? defaultSum : 0 ?>");
    document.getElementById('nameDisplay').textContent = defaultName;
    var submitted = false;
    var msgCopied = false;

    let globalOldNote = "";
    let globalNewNote = "";
    let globalOldReason = "";
    let globalNewReason = "";
    let globalDealAccountToSave = ""; // NEW
    let globalNewDealAccount = "";

    function copyMsg(name) {
      var reason = document.getElementById('reasonInput').value.trim();
      var reasonText = reason ? ', סיבת העברה: ' + reason : '';

      var newNoteText = document.getElementById('newNote').value.trim();
      var noteAppend = newNoteText ? '\nהערה: ' + newNoteText : '';

      var dealAcc = document.getElementById('dealAccountInput').value.trim();
      var dealAppend = dealAcc ? '\nחשבון עסקה: ' + dealAcc : '';

      var ta = document.getElementById('clipTarget');
      var roundedSum = Math.floor(defaultSum * 100) / 100;
      ta.value = 'העברתי עכשיו לטיפול המשרד חוב של ' + roundedSum + ' ש"ח על שם ' + name + reasonText + dealAppend + noteAppend;
      ta.focus();
      ta.select();
      document.execCommand('copy');
    }

    function doYes() {
      if (submitted) return;

      if (!msgCopied) {
        copyMsg(defaultName);
        msgCopied = true;
      }

      var newNote = document.getElementById('newNote').value.trim();
      var newReason = document.getElementById('reasonInput').value.trim();
      var dealAccount = document.getElementById('dealAccountInput').value.trim();

      // We always check now because reason usually has a default
      globalNewNote = newNote;
      globalNewReason = newReason;
      globalNewDealAccount = dealAccount;
      document.getElementById('loading1').style.display = 'block';
      document.getElementById('btnYes').disabled = true;

      google.script.run
        .withSuccessHandler(function (response) {
          document.getElementById('loading1').style.display = 'none';
          document.getElementById('btnYes').disabled = false;

          if (response.status === 'exists') {
            globalOldNote = response.oldNote || "";
            globalOldReason = response.oldReason || "";
            globalDealAccountToSave = response.dealAccountToSave || "";

            if (response.hasNoteConflict) {
              document.getElementById('conflictNoteContainer').classList.remove('hidden');
              document.getElementById('oldNotePreview').innerText = globalOldNote;
            } else {
              document.getElementById('conflictNoteContainer').classList.add('hidden');
            }

            if (response.hasReasonConflict) {
              document.getElementById('conflictReasonContainer').classList.remove('hidden');
              document.getElementById('oldReasonPreview').innerText = globalOldReason;
            } else {
              document.getElementById('conflictReasonContainer').classList.add('hidden');
            }

            if (response.hasDealAccountConflict) {
              document.getElementById('conflictDealAccountContainer').classList.remove('hidden');
              document.getElementById('oldDealAccountPreview').innerText = response.oldDealAccount || "";
            } else {
              document.getElementById('conflictDealAccountContainer').classList.add('hidden');
            }

            document.getElementById('view1').classList.add('hidden');
            document.getElementById('view2').classList.remove('hidden');
          } else if (response.status === 'success') {
            doTransferAndClose();
          } else {
            alert('שגיאה: ' + response.message);
            doTransferAndClose(); // Proceed anyway
          }
        })
        .withFailureHandler(function (error) {
          document.getElementById('loading1').style.display = 'none';
          document.getElementById('btnYes').disabled = false;
          alert('שגיאה בבדיקת המידע');
          doTransferAndClose();
        })
        .checkAndSaveCustomerNote(defaultName, newNote, newReason, dealAccount);
    }

    function actionKeepBoth() {
      const finalNote = document.getElementById('conflictNoteContainer').classList.contains('hidden') ? globalOldNote : globalOldNote + '\n' + globalNewNote;
      const finalReason = document.getElementById('conflictReasonContainer').classList.contains('hidden') ? globalOldReason : globalOldReason + " / " + globalNewReason;
      saveFinalNoteAndTransfer(finalNote, finalReason, globalDealAccountToSave, 2);
    }

    function actionKeepNew() {
      const finalNote = document.getElementById('conflictNoteContainer').classList.contains('hidden') ? globalOldNote : globalNewNote;
      const finalReason = document.getElementById('conflictReasonContainer').classList.contains('hidden') ? globalOldReason : globalNewReason;
      saveFinalNoteAndTransfer(finalNote, finalReason, globalNewDealAccount, 2);
    }

    function showEditView() {
      document.getElementById('view2').classList.add('hidden');
      document.getElementById('view3').classList.remove('hidden');
      document.getElementById('editedNote').value = document.getElementById('conflictNoteContainer').classList.contains('hidden') ? globalOldNote : globalOldNote + '\n' + globalNewNote;
      document.getElementById('editedReason').value = document.getElementById('conflictReasonContainer').classList.contains('hidden') ? globalOldReason : globalOldReason + " / " + globalNewReason;
      document.getElementById('editedDealAccount').value = globalDealAccountToSave;
    }

    function submitEditedNote() {
      const editedNote = document.getElementById('editedNote').value.trim();
      const editedReason = document.getElementById('editedReason').value.trim();
      const editedDealAccount = document.getElementById('editedDealAccount').value.trim();
      saveFinalNoteAndTransfer(editedNote, editedReason, editedDealAccount, 3);
    }

    function saveFinalNoteAndTransfer(finalNote, finalReason, finalDealAccount, viewNum) {
      document.getElementById('loading' + viewNum).style.display = 'block';
      const btns = document.getElementById('view' + viewNum).querySelectorAll('button');
      btns.forEach(btn => btn.disabled = true);

      google.script.run
        .withSuccessHandler(function (response) {
          document.getElementById('loading' + viewNum).style.display = 'none';
          if (response.status === 'success') {
            doTransferAndClose();
          } else {
            alert('שגיאה בשמירה: ' + response.message);
            doTransferAndClose();
          }
        })
        .withFailureHandler(function (error) {
          document.getElementById('loading' + viewNum).style.display = 'none';
          alert('שגיאה בשמירה');
          doTransferAndClose();
        })
        .overwriteCustomerNote(defaultName, finalNote, finalReason, finalDealAccount);
    }

    function doTransferAndClose() {
      if (submitted) return;
      submitted = true;
      if (!msgCopied) {
        copyMsg(defaultName);
        msgCopied = true;
      }
      
      // Show loading indicators and disable buttons
      ['loading1', 'loading2', 'loading3'].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.style.display = 'block';
          el.innerText = 'מעביר לטיפול המשרד... אנא המתן';
        }
      });
      document.querySelectorAll('button').forEach(b => b.disabled = true);

      google.script.run
        .withSuccessHandler(function() {
          google.script.host.close();
        })
        .withFailureHandler(function(err) {
          alert('שגיאה בהעברה: ' + err.message);
          google.script.host.close();
        })
        .runTransferForName(defaultName);
    }

    function doOther() {
      if (submitted) return;
      submitted = true;
      google.script.run
        .withSuccessHandler(function() {
          google.script.host.close();
        })
        .openNamePickerForTransfer(defaultName);
    }

    function doCancel() {
      google.script.host.close();
    }

    document.addEventListener('keydown', function (e) {
      // Disable default enter if focused on textarea to allow newlines
      if (e.key === 'Enter' && document.activeElement.tagName !== 'TEXTAREA') {
        e.preventDefault();

        // Find which view is active and trigger primary action
        if (!document.getElementById('view1').classList.contains('hidden')) {
          doYes();
        } else if (!document.getElementById('view3').classList.contains('hidden')) {
          submitEditedNote();
        }
      }
      if (e.key === 'Escape') {
        e.preventDefault();
        doCancel();
      }
    });

    window.onload = function () {
      var btn = document.getElementById('btnYes');
      setTimeout(function () {
        btn.focus();
      }, 100);
    };
  </script>
</body>

</html>

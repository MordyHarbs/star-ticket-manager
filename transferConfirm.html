<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="utf-8">
  <base target="_top">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: "Google Sans", Arial, sans-serif;
      background: #fff;
      color: #202124;
      direction: rtl;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 16px 20px;
      gap: 8px;
      text-align: center;
    }

    .icon { font-size: 26px; line-height: 1; margin-top: 5px; }

    .question {
      font-size: 13px;
      color: #5f6368;
    }

    .name {
      font-size: 16px;
      color: #1a73e8;
      font-weight: 700;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .footer {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding-top: 6px;
      margin-top: auto;
    }

    button {
      padding: 6px 14px;
      font-size: 13px;
      border-radius: 20px;
      cursor: pointer;
      border: none;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .btn-yes    { background: #1a73e8; color: #fff; }
    .btn-yes:hover { background: #1558b0; }
    .btn-other  { background: #e8f0fe; color: #1a73e8; border: 1px solid #c6dafc; }
    .btn-other:hover { background: #d2e3fc; }
    .btn-cancel { background: #f1f3f4; color: #5f6368; }
    .btn-cancel:hover { background: #e2e3e4; }

    #clipTarget { position: fixed; left: -9999px; top: -9999px; }
    
    /* New styles for note feature */
    #view1 { display: flex; flex-direction: column; align-items: center; width: 100%; }
    .note-container { margin-top: 10px; width: 100%; text-align: right; }
    .note-container label { font-size: 13px; color: #5f6368; margin-bottom: 3px; display: block; font-weight: bold; }
    .note-container textarea { width: 100%; height: 75px; padding: 6px; font-size: 13px; border: 1px solid #dadce0; border-radius: 4px; resize: none; font-family: inherit; }
    
    .loading { display: none; margin-top: 5px; font-size: 12px; color: #666; font-style: italic; }
    .hidden { display: none !important; }
    
    #view2, #view3 { width: 100%; text-align: right; padding-top: 10px; display: flex; flex-direction: column; height: 100%; }
    .old-note-preview { background-color: #fef7e0; padding: 8px; border-right: 4px solid #fbbc04; margin-bottom: 12px; white-space: pre-wrap; font-size: 12px; max-height: 100px; overflow-y: auto; color: #333; }
    .action-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; justify-content: center; }
  </style>
</head>
<body>
  
  <!-- View 1: Main Transfer Prompt -->
  <div id="view1">
    <div class="icon">🏢</div>
    <div class="question">להעביר לטיפול המשרד את כל החובות של:</div>
    <div class="name" id="nameDisplay"></div>

    <div style="margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;">
      <label for="reasonInput" style="font-size: 13px; color: #5f6368; font-weight: bold;">סיבת העברה:</label>
      <input type="text" id="reasonInput" list="reasonOptions" value="סירוב אשראי" tabindex="2" style="font-size: 13px; padding: 4px; border: 1px solid #dadce0; border-radius: 4px; width: 140px; text-align: center;">
      <datalist id="reasonOptions">
        <option value="סירוב אשראי">
        <option value="משלם מזומן">
        <option value="אין אשראי">
      </datalist>
    </div>

    <div class="note-container">
      <label for="newNote">הערה למשרד (אופציונלי):</label>
      <textarea id="newNote" tabindex="3" placeholder="הזן כאן הערה ללקוח זה..."></textarea>
    </div>
    
    <div id="loading1" class="loading">בודק הערות... אנא המתן</div>

    <div class="footer" style="margin-top: 10px;">
      <button class="btn-cancel" onclick="doCancel()" tabindex="6">ביטול</button>
      <button class="btn-other"  onclick="doOther()" tabindex="5">לקוח אחר</button>
      <button class="btn-yes" id="btnYes" onclick="doYes()" tabindex="1">✓ אישור</button>
    </div>
  </div>

  <!-- View 2: Exists Warning -->
  <div id="view2" class="hidden">
    <h3 style="color: #d32f2f; font-size: 16px; margin-bottom: 8px; text-align: center;">⚠️ מידע קיים</h3>
    <p style="font-size: 13px; margin-bottom: 8px;">כבר קיימת הערה/סיבה במערכת עבור לקוח זה.</p>
    
    <div id="conflictNoteContainer" class="hidden">
      <div style="font-size: 12px; font-weight: bold; text-align: right;">הערה קיימת:</div>
      <div class="old-note-preview" id="oldNotePreview"></div>
    </div>
    
    <div id="conflictReasonContainer" class="hidden">
      <div style="font-size: 12px; font-weight: bold; text-align: right;">סיבת העברה קיימת:</div>
      <div class="old-note-preview" id="oldReasonPreview"></div>
    </div>
    
    <div id="loading2" class="loading">שומר ומעביר...</div>
    
    <div class="action-btns">
      <button class="btn-yes" onclick="actionKeepBoth()" style="background:#34a853;">שמור הכל (שלב)</button>
      <button class="btn-other" onclick="showEditView()" style="background:#fbbc04; color:#333; border:none;">ערוך</button>
      <button class="btn-cancel" onclick="actionKeepNew()" style="background:#ea4335; color:#fff;">דרוס עם החדש</button>
      <button class="btn-cancel" onclick="doTransferAndClose()">השאר ישן (התעלם)</button>
    </div>
  </div>

  <!-- View 3: Edit Combined Note -->
  <div id="view3" class="hidden">
    <h3 style="font-size: 16px; margin-bottom: 8px; text-align: center;">עריכה</h3>
    <p style="font-size: 13px; margin-bottom: 8px;">ערוך לפני השמירה:</p>
    
    <div style="text-align: right; margin-bottom: 4px; font-size: 13px; font-weight: bold;">הערה למשרד:</div>
    <textarea id="editedNote" style="width: 100%; height: 70px; padding: 6px; font-size: 13px; border: 1px solid #dadce0; border-radius: 4px; resize: none; box-sizing: border-box; font-family: inherit; margin-bottom: 8px;"></textarea>
    
    <div style="text-align: right; margin-bottom: 4px; font-size: 13px; font-weight: bold;">סיבת העברה:</div>
    <input type="text" id="editedReason" style="width: 100%; padding: 6px; font-size: 13px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-family: inherit; margin-bottom: 8px;">
    
    <div id="loading3" class="loading">שומר ומעביר...</div>
    <div class="action-btns" style="margin-top: 10px;">
      <button class="btn-yes" onclick="submitEditedNote()">שמור והעבר</button>
      <button class="btn-cancel" onclick="doTransferAndClose()">בטל שינויים והעבר</button>
    </div>
  </div>

  <textarea id="clipTarget"></textarea>

  <script>
    var defaultName = "<?= defaultName ?>";
    var defaultSum = Number("<?= typeof defaultSum !== 'undefined' ? defaultSum : 0 ?>");
    document.getElementById('nameDisplay').textContent = defaultName;
    var submitted = false;
    var msgCopied = false;
    
    let globalOldNote = "";
    let globalNewNote = "";
    let globalOldReason = "";
    let globalNewReason = "";

    function copyMsg(name) {
      var reason = document.getElementById('reasonInput').value.trim();
      var reasonText = reason ? ', סיבת העברה: ' + reason : '';
      
      var newNoteText = document.getElementById('newNote').value.trim();
      var noteAppend = newNoteText ? '\nהערה: ' + newNoteText : '';
      
      var ta = document.getElementById('clipTarget');
      var roundedSum = Math.floor(defaultSum * 100) / 100;
      ta.value = 'העברתי עכשיו לטיפול המשרד חוב של ' + roundedSum + ' ש"ח על שם ' + name + reasonText + noteAppend;
      ta.focus();
      ta.select();
      document.execCommand('copy');
    }

    function doYes() {
      if (submitted) return;
      
      if (!msgCopied) {
        copyMsg(defaultName);
        msgCopied = true;
      }
      
      var newNote = document.getElementById('newNote').value.trim();
      var newReason = document.getElementById('reasonInput').value.trim();
      
      // We always check now because reason usually has a default
      globalNewNote = newNote;
      globalNewReason = newReason;
      document.getElementById('loading1').style.display = 'block';
      document.getElementById('btnYes').disabled = true;
      
      google.script.run
        .withSuccessHandler(function(response) {
          document.getElementById('loading1').style.display = 'none';
          document.getElementById('btnYes').disabled = false;
          
          if (response.status === 'exists') {
            globalOldNote = response.oldNote || "";
            globalOldReason = response.oldReason || "";
            
            if (response.hasNoteConflict) {
              document.getElementById('conflictNoteContainer').classList.remove('hidden');
              document.getElementById('oldNotePreview').innerText = globalOldNote;
            } else {
              document.getElementById('conflictNoteContainer').classList.add('hidden');
            }
            
            if (response.hasReasonConflict) {
              document.getElementById('conflictReasonContainer').classList.remove('hidden');
              document.getElementById('oldReasonPreview').innerText = globalOldReason;
            } else {
              document.getElementById('conflictReasonContainer').classList.add('hidden');
            }
            
            document.getElementById('view1').classList.add('hidden');
            document.getElementById('view2').classList.remove('hidden');
          } else if (response.status === 'success') {
            doTransferAndClose();
          } else {
            alert('שגיאה: ' + response.message);
            doTransferAndClose(); // Proceed anyway
          }
        })
        .withFailureHandler(function(error) {
          document.getElementById('loading1').style.display = 'none';
          document.getElementById('btnYes').disabled = false;
          alert('שגיאה בבדיקת המידע');
          doTransferAndClose();
        })
        .checkAndSaveCustomerNote(defaultName, newNote, newReason);
    }

    function actionKeepBoth() {
      const finalNote = document.getElementById('conflictNoteContainer').classList.contains('hidden') ? globalOldNote : globalOldNote + '\n' + globalNewNote;
      const finalReason = document.getElementById('conflictReasonContainer').classList.contains('hidden') ? globalOldReason : globalOldReason + " / " + globalNewReason;
      saveFinalNoteAndTransfer(finalNote, finalReason, 2);
    }

    function actionKeepNew() {
      const finalNote = document.getElementById('conflictNoteContainer').classList.contains('hidden') ? globalOldNote : globalNewNote;
      const finalReason = document.getElementById('conflictReasonContainer').classList.contains('hidden') ? globalOldReason : globalNewReason;
      saveFinalNoteAndTransfer(finalNote, finalReason, 2);
    }

    function showEditView() {
      document.getElementById('view2').classList.add('hidden');
      document.getElementById('view3').classList.remove('hidden');
      document.getElementById('editedNote').value = document.getElementById('conflictNoteContainer').classList.contains('hidden') ? globalOldNote : globalOldNote + '\n' + globalNewNote;
      document.getElementById('editedReason').value = document.getElementById('conflictReasonContainer').classList.contains('hidden') ? globalOldReason : globalOldReason + " / " + globalNewReason;
    }

    function submitEditedNote() {
      const editedNote = document.getElementById('editedNote').value.trim();
      const editedReason = document.getElementById('editedReason').value.trim();
      saveFinalNoteAndTransfer(editedNote, editedReason, 3);
    }

    function saveFinalNoteAndTransfer(finalNote, finalReason, viewNum) {
      document.getElementById('loading' + viewNum).style.display = 'block';
      const btns = document.getElementById('view' + viewNum).querySelectorAll('button');
      btns.forEach(btn => btn.disabled = true);
      
      google.script.run
        .withSuccessHandler(function(response) {
          document.getElementById('loading' + viewNum).style.display = 'none';
          if (response.status === 'success') {
            doTransferAndClose();
          } else {
            alert('שגיאה בשמירה: ' + response.message);
            doTransferAndClose();
          }
        })
        .withFailureHandler(function(error) {
          document.getElementById('loading' + viewNum).style.display = 'none';
          alert('שגיאה בשמירה');
          doTransferAndClose();
        })
        .overwriteCustomerNote(defaultName, finalNote, finalReason);
    }

    function doTransferAndClose() {
      if (submitted) return;
      submitted = true;
      if (!msgCopied) {
        copyMsg(defaultName);
        msgCopied = true;
      }
      google.script.run.runTransferForName(defaultName);
      google.script.host.close();
    }

    function doOther() {
      if (submitted) return;
      submitted = true;
      google.script.run.openNamePickerForTransfer(defaultName);
      google.script.host.close();
    }

    function doCancel() {
      google.script.host.close();
    }

    document.addEventListener('keydown', function(e) {
      // Disable default enter if focused on textarea to allow newlines
      if (e.key === 'Enter' && document.activeElement.tagName !== 'TEXTAREA') {
        e.preventDefault();
        
        // Find which view is active and trigger primary action
        if (!document.getElementById('view1').classList.contains('hidden')) {
          doYes();
        } else if (!document.getElementById('view3').classList.contains('hidden')) {
          submitEditedNote();
        }
      }
      if (e.key === 'Escape') {
        e.preventDefault();
        doCancel();
      }
    });

    window.onload = function() {
      var btn = document.getElementById('btnYes');
      setTimeout(function() {
        btn.focus();
      }, 100);
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="utf-8">
  <base target="_top">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: "Google Sans", Arial, sans-serif;
      background: #fff;
      color: #202124;
      direction: rtl;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 20px;
      gap: 8px;
      text-align: center;
    }

    .icon { font-size: 26px; line-height: 1; }

    .question {
      font-size: 13px;
      color: #5f6368;
    }

    .name {
      font-size: 16px;
      color: #1a73e8;
      font-weight: 700;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .footer {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding-top: 6px;
    }

    button {
      padding: 6px 14px;
      font-size: 13px;
      border-radius: 20px;
      cursor: pointer;
      border: none;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .btn-yes    { background: #1a73e8; color: #fff; }
    .btn-yes:hover { background: #1558b0; }
    .btn-other  { background: #e8f0fe; color: #1a73e8; border: 1px solid #c6dafc; }
    .btn-other:hover { background: #d2e3fc; }
    .btn-cancel { background: #f1f3f4; color: #5f6368; }
    .btn-cancel:hover { background: #e2e3e4; }

    #clipTarget { position: fixed; left: -9999px; top: -9999px; }
  </style>
</head>
<body>
  <div class="icon">🏢</div>
  <div class="question">להעביר לטיפול המשרד את כל החובות של:</div>
  <div class="name" id="nameDisplay"></div>

  <div style="margin-top: 14px; display: flex; align-items: center; justify-content: center; gap: 8px;">
    <label for="reasonInput" style="font-size: 13px; color: #5f6368;">סיבת העברה:</label>
    <input type="text" id="reasonInput" list="reasonOptions" value="סירוב אשראי" tabindex="2" style="font-size: 13px; padding: 4px; border: 1px solid #dadce0; border-radius: 4px; width: 140px; text-align: center;">
    <datalist id="reasonOptions">
      <option value="סירוב אשראי">
      <option value="משלם מזומן">
      <option value="אין אשראי">
    </datalist>
  </div>

  <div class="footer" style="margin-top: 8px;">
    <button class="btn-cancel" onclick="doCancel()" tabindex="5">ביטול</button>
    <button class="btn-other"  onclick="doOther()" tabindex="4">לקוח אחר</button>
    <button class="btn-yes" id="btnYes" onclick="doYes()" tabindex="1">✓ אישור</button>
  </div>

  <textarea id="clipTarget"></textarea>

  <script>
    var defaultName = "<?= defaultName ?>";
    var defaultSum = Number("<?= typeof defaultSum !== 'undefined' ? defaultSum : 0 ?>");
    document.getElementById('nameDisplay').textContent = defaultName;

    function copyMsg(name) {
      var reason = document.getElementById('reasonInput').value.trim();
      var reasonText = reason ? ', סיבת העברה: ' + reason : '';
      var ta = document.getElementById('clipTarget');
      ta.value = 'העברתי עכשיו לטיפול המשרד חוב של ' + defaultSum + ' ש"ח על שם ' + name + reasonText;
      ta.focus();
      ta.select();
      document.execCommand('copy');
    }

    function doYes() {
      copyMsg(defaultName);
      google.script.run.runTransferForName(defaultName);
      google.script.host.close();
    }

    function doOther() {
      google.script.run.openNamePickerForTransfer(defaultName);
      google.script.host.close();
    }

    function doCancel() {
      google.script.host.close();
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doYes();
      if (e.key === 'Escape') doCancel();
    });

    window.onload = function() {
      var btn = document.getElementById('btnYes');
      var attempts = 0;
      var focusInterval = setInterval(function() {
        window.focus();
        btn.focus();
        attempts++;
        if (document.activeElement === btn || attempts > 30) {
          clearInterval(focusInterval);
        }
      }, 100);
    };
  </script>
</body>
</html>

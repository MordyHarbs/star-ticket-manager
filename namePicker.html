<!DOCTYPE html>
<html dir="rtl">
  <head>
    <base target="_top">

    <style>
      body {
        margin: 0;
        padding: 20px;
        font-family: "Google Sans", Arial, sans-serif;
        background: #fafafa;
        color: #202124;
      }

      h3 {
        margin-top: 0;
        margin-bottom: 16px;
        font-size: 20px;
        font-weight: 500;
      }

      #searchBox, #nameSelect {
        width: 100%;
        box-sizing: border-box;
        font-size: 15px;
        padding: 8px 10px;
        border: 1px solid #dadce0;
        border-radius: 8px;
        background: #fff;
      }

      #searchBox:focus, #nameSelect:focus {
        outline: none;
        border-color: #1a73e8;
        box-shadow: 0 0 0 1px #1a73e8;
      }

      #nameSelect {
        margin-top: 10px;
        height: 160px;
      }

      .selected-box {
        margin-top: 12px;
        padding: 10px;
        background: #ffffff;
        border: 1px solid #dadce0;
        border-radius: 8px;
      }

      .selected-pill {
        display: inline-flex;
        align-items: center;
        background: #e8f0fe;
        color: #1a73e8;
        padding: 4px 12px 4px 8px;
        border-radius: 20px;
        margin: 4px 4px 0 0;
        font-size: 13px;
        border: 1px solid #c6dafc;
        gap: 6px;
      }

      .pill-x {
        width: 16px;
        height: 16px;
        font-size: 12px;
        line-height: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #d2e3fc;
        color: #1a73e8;
        border-radius: 50%;
        cursor: pointer;
      }
      .pill-x:hover {
        background: #c2d7fc;
        color: #1558b0;
      }

      .footer {
        margin-top: 20px;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      button {
        min-width: 70px;
        padding: 8px 18px;
        font-size: 14px;
        border-radius: 6px;
        cursor: pointer;
        border: none;
        transition: background 0.2s ease, box-shadow 0.2s ease;
      }

      .btn-cancel {
        background: #f1f3f4;
        color: #3c4043;
      }
      .btn-cancel:hover {
        background: #e9eaeb;
      }

      .btn-ok {
        background: #1a73e8;
        color: white;
      }
      .btn-ok:hover {
        background: #1558b0;
      }
    </style>

    <script>
      let allClients = [];
      let selectedNames = [];
      let debtMap = {};
      const defaultName = "<?= defaultName ?>";  // but we won't auto-select it

      function onLoad() {
        if (action === 'transfer') {
          document.getElementById('reasonContainer').style.display = 'flex';
          google.script.run.withSuccessHandler(data => {
            allClients = data.clients;
            debtMap = data.debtMap;
            populateList();
          }).getAllClientsWithDebts();
        } else {
          google.script.run.withSuccessHandler(clients => {
            allClients = clients;
            populateList();
          }).getAllClients();
        }
      }

      function populateList() {
        const select = document.getElementById("nameSelect");
        allClients.forEach(name => {
          const opt = document.createElement("option");
          opt.value = name;
          opt.textContent = name;
          select.appendChild(opt);
        });

        // *** DO NOT auto-select defaultName ***
        // (We simply ignore defaultName completely)

        document.getElementById("btnOk").focus();

        refreshSelectVisual();
        updateSelectedBox();
      }

      function addName(name) {
        if (!selectedNames.includes(name)) {
          selectedNames.push(name);
          refreshSelectVisual();
          updateSelectedBox();
        }
      }

      function removeName(name) {
        selectedNames = selectedNames.filter(n => n !== name);
        refreshSelectVisual();
        updateSelectedBox();
      }

      function refreshSelectVisual() {
        const select = document.getElementById("nameSelect");

        // Clear selected states
        for (const opt of select.options) {
          opt.selected = false;
        }

        // Re-apply highlighted selected names
        selectedNames.forEach(name => {
          for (const opt of select.options) {
            if (opt.value === name) opt.selected = true;
          }
        });
      }

      function updateSelectedBox() {
        const list = document.getElementById("selectedList");
        list.innerHTML = "";

        selectedNames.forEach(name => {
          const pill = document.createElement("div");
          pill.className = "selected-pill";

          const x = document.createElement("span");
          x.className = "pill-x";
          x.textContent = "×";
          x.onclick = () => removeName(name);

          pill.appendChild(x);
          pill.appendChild(document.createTextNode(name));

          list.appendChild(pill);
        });
      }

      // Allow overriding the server function
      const action = "<?= typeof action !== 'undefined' ? action : 'markPaid' ?>";

      function submit() {
  if (action === 'transfer') {
    var reason = document.getElementById('reasonInput').value.trim();
    var reasonText = reason ? ', סיבת העברה: ' + reason : '';
    var msgs = [];
    selectedNames.forEach(function(name) {
      var sum = debtMap[name] || 0;
      msgs.push('העברתי עכשיו לטיפול המשרד חוב של ' + sum + ' ש"ח על שם ' + name + reasonText);
    });
    var msg = msgs.join('\n');

    // Use persistent off-screen textarea for reliable execCommand copy
    var ta = document.getElementById('clipTarget');
    ta.value = msg;
    ta.focus();
    ta.select();
    document.execCommand('copy');

    google.script.run.runTransferForName(selectedNames);
    setTimeout(function() { google.script.host.close(); }, 200);
  } else if (action === 'markOfficePaid') {
    google.script.run.runMarkOfficeForName(selectedNames);
    setTimeout(function() { google.script.host.close(); }, 200);
  } else {
    google.script.run.runMarkAllForName(selectedNames);
    setTimeout(function() { google.script.host.close(); }, 200);
  }
}

      function cancel() {
        google.script.host.close();
      }

      function filterNames() {
        const input = document.getElementById("searchBox").value.toLowerCase();
        const select = document.getElementById("nameSelect");
        select.innerHTML = "";

        allClients
          .filter(n => n.toLowerCase().includes(input))
          .forEach(n => {
            const opt = document.createElement("option");
            opt.value = n;
            opt.textContent = n;
            select.appendChild(opt);
          });

        refreshSelectVisual();
      }

      function handleDoubleClick(event) {
        const name = event.target.value;
        if (name) addName(name);
      }
    </script>

  </head>

  <body onload="onLoad()">
    <h3>בחר לקוח</h3>

    <input
      type="text"
      id="searchBox"
      placeholder="הקלד כדי לחפש..."
      oninput="filterNames()"
    >

    <select id="nameSelect" size="6" multiple ondblclick="handleDoubleClick(event)">
    </select>

    <div id="selectedBox" class="selected-box">
      <strong>נבחרו:</strong>
      <div id="selectedList"></div>
    </div>

    <div id="reasonContainer" style="margin-top: 16px; display: none; align-items: center; gap: 8px;">
      <label for="reasonInput" style="font-size: 14px; font-weight: 500;">סיבת העברה:</label>
      <input type="text" id="reasonInput" list="reasonOptions" value="סירוב אשראי" tabindex="2" style="flex-grow: 1; font-size: 14px; padding: 6px; border: 1px solid #dadce0; border-radius: 4px;">
      <datalist id="reasonOptions">
        <option value="סירוב אשראי">
        <option value="משלם מזומן">
        <option value="אין אשראי">
      </datalist>
    </div>

    <div class="footer">
      <button class="btn-cancel" onclick="cancel()" tabindex="4">בטל</button>
      <button class="btn-ok" id="btnOk" onclick="submit()" tabindex="1">אישור</button>
    </div>

    <!-- Persistent off-screen textarea used for clipboard copy -->
    <textarea id="clipTarget" style="position:absolute;left:-9999px;top:-9999px;"></textarea>
  </body>
</html>
